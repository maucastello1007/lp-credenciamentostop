<!doctype html>
<html lang="pt-BR" data-type-pair="bold">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>STOP — Credenciamento para Dentistas (Infoproduto)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --navy:        #0A1530;
    --navy-2:      #0F1E3F;
    --navy-3:      #16294F;
    --navy-line:   #25375E;

    --blue:        #2D8DCB;        /* tooth blue, brightened */
    --blue-2:      #1F7AB8;
    --blue-soft:   #0E69A3;

    --gold:        #3FB6FF;         /* bright sky blue — high contrast on navy */
    --gold-2:      #1F7AB8;         /* logo blue, deeper, for shadows/stars */
    --gold-soft:   #D6EDFF;         /* light blue tint */

    --cream:       #FBF7EE;
    --cream-2:     #F2EBDA;
    --line:        #E4DBC7;
    --ink:         #0A1530;
    --ink-soft:    #344266;
    --muted:       #6C7798;

    --red:         #E0594B;
    --green:       #1E8A5A;

    --font-display: "Bricolage Grotesque", -apple-system, sans-serif;
    --font-sans:    "Manrope", -apple-system, sans-serif;
    --font-mono:    "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 17px;
    line-height: 1.55;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  ::selection { background: var(--gold); color: var(--navy); }

  .wrap     { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
  .wrap-sm  { max-width: 880px;  margin: 0 auto; padding: 0 32px; }
  .wrap-md  { max-width: 1020px; margin: 0 auto; padding: 0 32px; }

  /* ============ TYPE ============ */
  .display {
    font-family: var(--font-display);
    font-weight: 700;
    line-height: 1.02;
    letter-spacing: -0.03em;
    font-stretch: 90%;
  }
  .display-xl { font-size: clamp(48px, 7vw, 96px); }
  .display-lg { font-size: clamp(40px, 5.4vw, 72px); }
  .display-md { font-size: clamp(32px, 4vw, 54px); }
  .display-sm { font-size: clamp(24px, 2.6vw, 36px); }

  .hl-yellow {
    background: linear-gradient(180deg, transparent 55%, var(--gold) 55%, var(--gold) 92%, transparent 92%);
    padding: 0 4px;
    color: var(--ink);
  }
  .dark .hl-yellow { color: var(--navy); background: linear-gradient(180deg, transparent 55%, rgba(63,182,255,.95) 55%, rgba(63,182,255,.95) 92%, transparent 92%); -webkit-background-clip: padding-box; }
  .dark .hl-yellow.inverted {
    color: var(--navy);
    background: var(--gold);
    background-image: none;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
    padding: 0.06em 0.18em;
    border-radius: 6px;
    line-height: 1.35;
  }

  .underline-wavy {
    text-decoration: underline;
    text-decoration-color: var(--gold);
    text-decoration-thickness: 6px;
    text-underline-offset: 2px;
    text-decoration-skip-ink: none;
  }
  .stroke-text {
    -webkit-text-stroke: 1.5px var(--ink);
    color: transparent;
  }
  .dark .stroke-text { -webkit-text-stroke: 1.5px #fff; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--blue);
    font-weight: 700;
  }
  .dark .eyebrow { color: var(--gold); }
  .eyebrow::before {
    content: ""; display: inline-block;
    width: 22px; height: 1.5px; background: currentColor;
  }

  .lead {
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 60ch;
  }
  .dark .lead { color: rgba(255,255,255,.78); }

  /* ============ BUTTON ============ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 28px;
    border-radius: 14px;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.005em;
    border: 2px solid transparent;
    transition: transform .12s ease, box-shadow .2s ease, background .2s, border-color .2s, color .2s;
    line-height: 1;
    white-space: nowrap;
    text-transform: uppercase;
    font-family: var(--font-sans);
  }
  .btn-gold {
    background: var(--gold);
    color: var(--navy);
    box-shadow: 0 4px 0 var(--gold-2), 0 10px 30px -10px rgba(63,182,255,.5);
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--gold-2), 0 16px 36px -10px rgba(63,182,255,.6); }
  .btn-gold:active { transform: translateY(0); box-shadow: 0 2px 0 var(--gold-2); }
  .btn-navy {
    background: var(--navy);
    color: #fff;
    box-shadow: 0 4px 0 #000, 0 10px 30px -10px rgba(10,21,48,.5);
  }
  .btn-navy:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #000, 0 16px 36px -10px rgba(10,21,48,.6); }
  .btn-outline {
    background: transparent;
    color: var(--ink);
    border-color: var(--ink);
  }
  .dark .btn-outline { color: #fff; border-color: #fff; }
  .btn-outline:hover { background: var(--ink); color: var(--cream); }
  .dark .btn-outline:hover { background: #fff; color: var(--navy); }
  .btn-xl { padding: 22px 34px; font-size: 17px; }

  /* ============ TICKER ============ */
  .ticker {
    background: var(--navy);
    color: #fff;
    padding: 11px 0;
    overflow: hidden;
    border-bottom: 1px solid var(--navy-line);
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .ticker .strip {
    display: flex; gap: 48px;
    animation: tickslide 32s linear infinite;
    width: max-content;
  }
  .ticker .strip span {
    display: inline-flex; align-items: center; gap: 14px;
    color: rgba(255,255,255,.85);
  }
  .ticker .strip .star { color: var(--gold); font-weight: 700; }
  @keyframes tickslide {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ============ NAV ============ */
  header.nav {
    position: sticky;
    top: 0; z-index: 50;
    background: rgba(251,247,238,0.85);
    backdrop-filter: saturate(150%) blur(12px);
    -webkit-backdrop-filter: saturate(150%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  header.nav .inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
  }
  header.nav .logo img { height: 40px; display: block; }
  header.nav .right { display: flex; align-items: center; gap: 14px; }
  header.nav .wa {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; color: var(--ink-soft); font-weight: 600;
  }
  header.nav .wa svg { width: 16px; height: 16px; }
  header.nav .btn { padding: 12px 18px; font-size: 13px; border-radius: 10px; }
  header.nav .btn-gold { box-shadow: 0 3px 0 var(--gold-2); }

  /* ============ HERO (dark) ============ */
  .hero.dark {
    background: var(--navy);
    color: #fff;
    padding: 70px 0 90px;
    position: relative;
    overflow: hidden;
  }
  .hero.dark::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(45,141,203,.22), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(63,182,255,.14), transparent 50%);
    pointer-events: none;
  }
  .hero.dark::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 80px 100%;
    mask-image: linear-gradient(to bottom, black 0%, transparent 80%);
    pointer-events: none;
  }
  .hero-inner { position: relative; z-index: 1; text-align: center; }
  .hero-stamps {
    display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 32px;
  }
  .stamp {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 999px;
    font-size: 12.5px;
    color: rgba(255,255,255,.85);
    font-weight: 600;
  }
  .stamp .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 12px rgba(63,182,255,.6); }
  .stamp .check { color: var(--gold); }
  .hero-h1 {
    color: #fff;
    max-width: 18ch;
    margin: 0 auto;
  }
  .hero-h1 .hl { color: var(--gold); }
  .hero-sub {
    margin: 32px auto 0;
    max-width: 60ch;
    color: rgba(255,255,255,.78);
    font-size: 19px;
    line-height: 1.55;
  }
  .hero-cta-row {
    display: flex; gap: 16px; flex-wrap: wrap;
    justify-content: center;
    margin-top: 40px;
  }
  .hero-trust {
    margin-top: 28px;
    display: flex; gap: 28px; flex-wrap: wrap;
    justify-content: center;
    font-size: 13.5px;
    color: rgba(255,255,255,.65);
  }
  .hero-trust .pill {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .hero-trust .pill svg { width: 14px; height: 14px; color: var(--gold); }

  /* Counter strip */
  .counter-strip {
    margin-top: 80px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 20px;
    padding: 32px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    position: relative;
  }
  .counter-strip .c {
    text-align: center;
    padding: 12px;
    border-right: 1px dashed rgba(255,255,255,.12);
  }
  .counter-strip .c:last-child { border-right: 0; }
  .counter-strip .c .num {
    font-family: var(--font-display);
    font-size: clamp(36px, 4vw, 56px);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.025em;
  }
  .counter-strip .c .lab {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(255,255,255,.7);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--font-mono);
  }

  /* ============ MARQUEE proof ============ */
  .marquee {
    background: var(--gold);
    color: var(--navy);
    padding: 18px 0;
    overflow: hidden;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.01em;
    border-top: 2px solid var(--navy);
    border-bottom: 2px solid var(--navy);
  }
  .marquee .strip {
    display: flex; gap: 48px;
    animation: tickslide 28s linear infinite;
    width: max-content;
  }
  .marquee .strip span { display: inline-flex; align-items: center; gap: 24px; }
  .marquee .strip .sep {
    width: 24px; height: 24px;
    background: var(--navy); border-radius: 50%;
    flex-shrink: 0;
  }

  /* ============ SECTIONS ============ */
  section { padding: 110px 0; position: relative; }
  section.tight { padding: 80px 0; }
  section + section { border-top: 1px solid rgba(0,0,0,.06); }
  section.dark {
    background: var(--navy);
    color: #fff;
  }
  section.dark + section.dark { border-top: 1px solid var(--navy-line); }
  section.cream-2 { background: var(--cream-2); }

  /* ============ PAIN  for-who block ============ */
  .for-who {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 56px;
  }
  .for-card {
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 6px 6px 0 0 var(--ink);
  }
  .for-card.no { background: #fff; }
  .for-card.no .head {
    color: var(--red);
  }
  .for-card.yes .head {
    color: var(--green);
  }
  .for-card .head {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    line-height: 1.1;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 22px;
    letter-spacing: -0.02em;
  }
  .for-card ul {
    margin: 0; padding: 0; list-style: none;
    display: flex; flex-direction: column; gap: 14px;
  }
  .for-card li {
    display: flex; gap: 14px; align-items: flex-start;
    font-size: 15.5px; color: var(--ink-soft); line-height: 1.45;
  }
  .for-card li .ix {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .for-card.yes li .ix { background: var(--green); color: #fff; }
  .for-card.no  li .ix { background: var(--red); color: #fff; font-weight: 800; font-size: 16px; line-height: 1; }
  .for-card li .ix svg { width: 14px; height: 14px; }

  /* ============ Method 3 steps ============ */
  .steps {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .step {
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 36px 32px;
    position: relative;
    box-shadow: 6px 6px 0 0 var(--ink);
  }
  .step .num {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 88px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--gold);
    -webkit-text-stroke: 2px var(--ink);
    margin-bottom: 14px;
  }
  .step h4 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 24px;
    line-height: 1.15;
    margin: 0 0 12px;
    letter-spacing: -0.02em;
  }
  .step p {
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 0;
  }

  /* ============ Benefits grid ============ */
  .benefits {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .benefit-card {
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 18px;
    padding: 28px 26px 32px;
    display: flex; flex-direction: column; gap: 16px;
    transition: transform .15s, box-shadow .15s;
  }
  .benefit-card:hover {
    transform: translateY(-3px);
    box-shadow: 5px 5px 0 0 var(--ink);
  }
  .benefit-card .ic {
    width: 48px; height: 48px;
    background: var(--gold);
    border: 1.5px solid var(--ink);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
  }
  .benefit-card .ic svg { width: 22px; height: 22px; }
  .benefit-card h4 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 21px;
    line-height: 1.15;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .benefit-card p {
    margin: 0;
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.55;
  }

  /* ============ Testimonials ============ */
  .testimonials-grid {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
  }
  .tm-card {
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 20px;
    padding: 28px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .tm-card .stars { color: var(--gold-2); display: flex; gap: 2px; }
  .tm-card .stars svg { width: 16px; height: 16px; }
  .tm-card .quote {
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    font-weight: 500;
    margin: 0;
  }
  .tm-card .quote .hl {
    background: var(--gold);
    padding: 0 4px;
  }
  .tm-card .who {
    display: flex; align-items: center; gap: 14px;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  .tm-card .avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--navy); color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    overflow: hidden;
    border: 2px solid var(--ink);
    flex-shrink: 0;
  }
  .tm-card .avatar img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .tm-card .name { font-weight: 700; font-size: 15px; line-height: 1.2; }
  .tm-card .role { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  /* ============ Professor ============ */
  .prof-grid {
    display: grid;
    grid-template-columns: minmax(0, 480px) 1fr;
    gap: 64px;
    align-items: center;
  }
  .prof-photo {
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    border: 2px solid var(--ink);
    aspect-ratio: 4 / 5;
    box-shadow: 10px 10px 0 0 var(--ink);
  }
  .prof-photo img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .prof-photo .tag {
    position: absolute;
    bottom: 18px; left: 18px;
    background: var(--gold);
    color: var(--navy);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
    border: 1.5px solid var(--ink);
  }
  .prof-name {
    font-family: var(--font-display);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.035em;
    font-size: clamp(40px, 5vw, 64px);
    margin: 14px 0 0;
  }
  .prof-name small {
    display: block;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--blue);
    margin-top: 12px;
  }
  .prof-bio {
    margin-top: 22px;
    font-size: 16.5px;
    line-height: 1.6;
    color: var(--ink-soft);
    max-width: 56ch;
  }
  .prof-bio p { margin: 0 0 14px; }
  .prof-bio p:last-child { margin-bottom: 0; }
  .prof-bio b { color: var(--ink); font-weight: 700; }
  .prof-stats {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .prof-stat {
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .prof-stat .n {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .prof-stat .l {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.35;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ============ OFFER ============ */
  .offer-block {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 10px 10px 0 0 var(--ink);
  }
  .offer-head {
    background: var(--navy);
    color: #fff;
    padding: 36px 48px;
    text-align: center;
    position: relative;
  }
  .offer-head .label {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    padding: 8px 16px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .offer-head h3 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(28px, 3.4vw, 44px);
    line-height: 1.1;
    margin: 0;
    letter-spacing: -0.025em;
    max-width: 22ch;
    margin-inline: auto;
  }
  .offer-body {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 0;
  }
  .offer-list {
    padding: 40px 44px;
    border-right: 2px dashed var(--ink);
  }
  .offer-list .item {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px dashed var(--line);
    align-items: baseline;
  }
  .offer-list .item:last-child { border-bottom: 0; }
  .offer-list .check {
    width: 22px; height: 22px;
    background: var(--green); color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .offer-list .check svg { width: 12px; height: 12px; }
  .offer-list .what { font-size: 15px; color: var(--ink); line-height: 1.4; font-weight: 500; }
  .offer-list .val {
    font-family: var(--font-mono);
    font-size: 12.5px;

  .price-now .top {

    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
  }
  .price-now .big {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.035em;
    margin-top: 10px;
    color: #fff;

  .offer-foot {

    border: 2.5px solid var(--ink);
    box-shadow: 4px 4px 0 0 var(--ink);

    transform: rotate(6deg);

    margin-top: 4px;
    font-weight: 700;

    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    margin-top: 8px;
    text-transform: uppercase;
    font-weight: 700;

    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);

    line-height: 1.6;

    font-family: var(--font-sans);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0;

  .accord.simple summary .toggle {

    background: #fff;

    section { padding: 70px 0; }
    .wrap, .wrap-sm, .wrap-md { padding: 0 22px; }

  }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function Marquee() {
  const items = [
    "PREVENÇÃO COM PROPÓSITO",
    "RECEITA RECORRENTE",
    "PACIENTES FIDELIZADOS",
    "AGENDA PREVISÍVEL",
    "MARCA RECONHECIDA",
    "COMUNIDADE ATIVA",
  ];
  const set = [...items, ...items, ...items];
  return (
    <div className="marquee">
      <div className="strip">
        {set.map((t, i) => (
          <span key={i}>{t} <span className="sep"></span></span>
        ))}
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS_V2 = /*EDITMODE-BEGIN*/{
  "headline": "A",
  "guaranteeDays": 15
}/*EDITMODE-END*/;

function AppV2() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS_V2);
  return (
    <>
      <TickerBar />
      <NavV2 />
      <HeroV2 variant={t.headline} />
      <Marquee />
      <ForWho />
      <StepsV2 />
      <BenefitsV2 />
      <TestimonialsV2 />
      <OfferV2 />
      <ObjectionsV2 />
      <GuaranteeV2 days={t.guaranteeDays} />
      <ProfessorV2 />
      <FAQV2 />
      <PSV2 />
      <FinalCTAV2 />
      <SpecialistV2 />
      <FooterV2 />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Headline" />
        <TweakRadio
          label="Variação"
          value={t.headline}
          options={["A", "B", "C"]}
          onChange={(v) => setTweak("headline", v)}
        />
        <div style={{fontSize: 11, color: 'rgba(255,255,255,.55)', padding: '4px 4px 8px', lineHeight: 1.45}}>
          A — Dor/descoberta · B — Resultado/renda · C — Identidade/movimento

        <TweakSection label="Garantia" />
        <TweakRadio
          label="Duração"
          value={t.guaranteeDays}
          options={[7, 15, 30]}
          onChange={(v) => setTweak("guaranteeDays", v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppV2 />);
